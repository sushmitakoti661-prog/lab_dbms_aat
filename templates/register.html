<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Smart Lab Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card" style="max-width:480px;">

        <div class="auth-logo">
            <div class="logo-icon">SL</div>
            <span>SmartLab</span>
        </div>

        <h1 class="auth-title">Create account</h1>
        <p class="auth-subtitle">Fill in the details below to register</p>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        <i class="fa-solid
                            {% if category == 'success' %}fa-circle-check
                            {% elif category == 'danger' %}fa-circle-xmark
                            {% else %}fa-triangle-exclamation{% endif %}">
                        </i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('register') }}">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" class="form-control"
                       placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control"
                       placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Min. 6 characters" required>
            </div>

            <div class="form-group">
                <label>Role</label>
                <select name="role" class="form-control" id="roleSelect"
                  onchange="toggleTechFields()">
                  <option value="student">Student</option>
                  <option value="technician">Technician</option>
                  <option value="admin">Admin</option>
                </select>
            </div>

            <!-- Technician Extra Fields -->
            <div id="techFields" style="display:none;">
                <div class="form-group">
                    <label>Specialization</label>
                    <input type="text" name="specialization" class="form-control"
                           placeholder="e.g. Hardware, Networking">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" class="form-control"
                           placeholder="10-digit number">
                </div>
            </div>

            <!-- SUBMIT BUTTON — outside techFields, always visible -->
            <button type="submit" class="btn btn-primary"
                    style="width:100%;justify-content:center;padding:11px;margin-top:8px;">
                <i class="fa-solid fa-user-plus"></i> Create Account
            </button>

        </form>

        <div class="auth-footer" style="margin-top:20px;">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </div>

    </div>
</div>

<script>
    function toggleTechFields() {
        const role = document.getElementById('roleSelect').value;
        const techFields = document.getElementById('techFields');
        techFields.style.display = role === 'technician' ? 'block' : 'none';
    }
</script>

</body>
</html>
